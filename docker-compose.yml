services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rejeki
      POSTGRES_USER: rejeki
      POSTGRES_PASSWORD: rejeki
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rejeki"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./mcp
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  platform-backend:
    build: ./platform/backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  platform-frontend:
    build: ./platform/frontend
    ports:
      - "80:80"
    depends_on:
      - platform-backend
    restart: unless-stopped

volumes:
  postgres_data:
